<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>名刺CRM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
.app{max-width:960px;margin:0 auto;padding:1.5rem 1rem}
h1{font-size:18px;font-weight:600;margin-bottom:1.5rem;display:flex;align-items:center;gap:10px}
h1 span{font-size:12px;font-weight:400;background:#e8f5e9;color:#2e7d32;padding:3px 10px;border-radius:20px}
.tabs{display:flex;gap:4px;margin-bottom:1.5rem;border-bottom:1px solid #e0e0e0}
.tab{padding:8px 18px;font-size:13px;cursor:pointer;border:none;background:none;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;font-family:inherit}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}
.tab:hover:not(.active){color:#1a1a1a}
.panel{display:none}.panel.active{display:block}
.sync-bar{background:#e8f5e9;border:1px solid #c8e6c9;border-radius:10px;padding:.75rem 1.25rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:10px;font-size:13px;color:#2e7d32}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#4caf50;flex-shrink:0}
.card{background:#fff;border:1px solid #e8e8e5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.upload-zone{border:2px dashed #d0d0cc;border-radius:10px;padding:2rem;text-align:center;cursor:pointer;transition:all .2s;background:#fafaf8;margin-bottom:1rem}
.upload-zone:hover,.upload-zone.drag{border-color:#999;background:#fff}
.upload-zone strong{font-size:14px;color:#1a1a1a}
.upload-zone p{font-size:13px;color:#888;margin-top:6px}
input[type=file]{display:none}
.queue-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.queue-item{background:#f5f5f3;border:1px solid #e0e0e0;border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:12px}
.queue-thumb{width:48px;height:36px;object-fit:cover;border-radius:4px;border:1px solid #e0e0e0;flex-shrink:0}
.queue-info{flex:1;min-width:0}
.queue-name{font-size:13px;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.queue-status{font-size:11px;margin-top:2px}
.queue-status.reading{color:#e65100}
.queue-status.done{color:#2e7d32}
.queue-status.error{color:#c62828}
.queue-remove{background:none;border:none;cursor:pointer;color:#bbb;font-size:16px;padding:0 4px}
.queue-remove:hover{color:#c62828}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.field-grid{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.05em}
.field input,.field textarea,.field select{background:#f5f5f3;border:1px solid #e0e0e0;border-radius:8px;padding:8px 10px;font-size:13px;color:#1a1a1a;width:100%;font-family:inherit;resize:vertical;transition:border-color .15s}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:#999;background:#fff}
.field.full{grid-column:1/-1}
.btn{padding:8px 16px;border-radius:8px;border:1px solid #d0d0cc;background:#fff;font-size:13px;cursor:pointer;color:#1a1a1a;font-family:inherit;transition:all .15s}
.btn:hover{background:#f5f5f3}
.btn.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn.primary:hover{background:#333}
.btn.primary:disabled{opacity:.5;cursor:not-allowed}
.btn.danger{color:#c62828;border-color:#ffcdd2}
.btn.danger:hover{background:#ffebee}
.btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500}
.badge.hot{background:#ffebee;color:#c62828}
.badge.warm{background:#fff8e1;color:#e65100}
.badge.cold{background:#f5f5f5;color:#757575}
.badge.deal{background:#e8f5e9;color:#2e7d32}
.badge.ng{background:#fce4ec;color:#880e4f}
.sync-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px}
.sync-badge.ok{background:#e8f5e9;color:#2e7d32}
.sync-badge.pending{background:#fff8e1;color:#e65100}
.list-item{background:#fff;border:1px solid #e8e8e5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:8px;cursor:pointer;transition:border-color .15s;display:flex;align-items:center;gap:12px}
.list-item:hover{border-color:#bbb}
.list-item .info{flex:1;min-width:0}
.list-item .name{font-size:14px;font-weight:500}
.list-item .meta{font-size:12px;color:#888;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-item .right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.avatar{width:40px;height:40px;border-radius:50%;background:#e3f2fd;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:#1565c0;flex-shrink:0}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
@media(max-width:600px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat{background:#fff;border:1px solid #e8e8e5;border-radius:10px;padding:1rem;text-align:center}
.stat-num{font-size:24px;font-weight:600}
.stat-label{font-size:11px;color:#888;margin-top:4px}
.search-bar{display:flex;gap:8px;margin-bottom:1rem}
.search-bar input{flex:1;background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:8px 12px;font-size:13px;color:#1a1a1a;font-family:inherit}
.search-bar input:focus{outline:none;border-color:#999}
.search-bar select{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:8px 10px;font-size:13px;color:#1a1a1a;font-family:inherit}
.overlay{display:none;position:fixed;inset:0;z-index:100;align-items:flex-start;justify-content:center;padding:2rem;overflow-y:auto}
.overlay.open{display:flex}
.overlay-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4)}
.modal{background:#fff;border:1px solid #e8e8e5;border-radius:14px;padding:1.5rem;width:100%;max-width:560px;position:relative;z-index:1;margin:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.modal-title{font-size:16px;font-weight:500}
.notes-list{display:flex;flex-direction:column;gap:8px;margin-top:1rem}
.note-item{background:#f5f5f3;border-radius:8px;padding:10px 12px;font-size:13px}
.note-meta{font-size:11px;color:#aaa;margin-top:4px}
.empty{text-align:center;padding:3rem;color:#bbb;font-size:13px}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.card-header-row{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.divider{border-top:1px solid #e8e8e5;padding-top:1rem;margin-top:.5rem}
.note-input-row{display:flex;gap:8px;margin-top:.5rem}
.note-input-row input{flex:1;background:#f5f5f3;border:1px solid #e0e0e0;border-radius:8px;padding:7px 10px;font-size:13px;color:#1a1a1a;font-family:inherit}
.note-input-row input:focus{outline:none;border-color:#999;background:#fff}
.form-section-title{font-size:13px;font-weight:500;color:#555;margin:1rem 0 .5rem;padding-bottom:.5rem;border-bottom:1px solid #f0f0f0}
</style>
</head>
<body>
<div class="app">
  <h1>名刺CRM <span>● スプレッドシート同期中</span></h1>
  <div class="sync-bar">
    <div class="sync-dot"></div>
    Googleスプレッドシートと同期が有効です。登録・更新・削除が自動で反映されます。
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('register',this)">名刺登録</button>
    <button class="tab" onclick="showTab('list',this)">顧客一覧</button>
  </div>

  <div id="panel-register" class="panel active">
    <div class="card">
      <div class="upload-zone" id="dropzone"
        onclick="document.getElementById('file-input').click()"
        ondragover="onDrag(event,true)" ondragleave="onDrag(event,false)" ondrop="onDrop(event)">
        <svg style="width:36px;height:36px;margin:0 auto 10px;display:block;opacity:.35" viewBox="0 0 40 40" fill="none">
          <rect x="4" y="8" width="32" height="24" rx="3" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <path d="M14 16h12M14 20h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="28" cy="26" r="7" fill="white" stroke="currentColor" stroke-width="1.5"/>
          <path d="M28 23v6M25 26l3-3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <strong>名刺画像をドロップ（複数枚対応）</strong>
        <p>またはクリックして選択（JPG / PNG）· 自動圧縮対応</p>
      </div>
      <input type="file" id="file-input" accept="image/*" multiple onchange="handleFiles(event)">
      <div id="queue-list" class="queue-list" style="display:none"></div>
    </div>

    <div id="form-area" style="display:none">
      <div class="card">
        <div class="card-header-row">
          <div class="avatar" id="form-avatar">-</div>
          <div>
            <div style="font-size:15px;font-weight:500">抽出情報の確認・編集</div>
            <div style="font-size:12px;color:#888;margin-top:2px">修正後に保存するとスプレッドシートに自動反映されます</div>
          </div>
        </div>
        <div class="form-section-title">基本情報</div>
        <div class="field-grid">
          <div class="field"><label>会社名</label><input type="text" id="f-company" oninput="updateAvatar()"></div>
          <div class="field"><label>氏名</label><input type="text" id="f-name" oninput="updateAvatar()"></div>
          <div class="field"><label>役職</label><input type="text" id="f-title"></div>
          <div class="field"><label>メールアドレス</label><input type="email" id="f-email"></div>
          <div class="field"><label>電話番号</label><input type="tel" id="f-phone"></div>
          <div class="field"><label>Webサイト</label><input type="text" id="f-web"></div>
        </div>
        <div class="form-section-title">交流会情報</div>
        <div class="field-grid">
          <div class="field"><label>名刺交換日</label><input type="date" id="f-date"></div>
          <div class="field"><label>交流会・場所</label><input type="text" id="f-event"></div>
          <div class="field full"><label>商談角度</label>
            <select id="f-status">
              <option value="warm">Warm（興味あり）</option>
              <option value="hot">Hot（高確度）</option>
              <option value="cold">Cold（様子見）</option>
              <option value="deal">成約</option>
              <option value="ng">NG</option>
            </select>
          </div>
          <div class="field full"><label>話した内容・メモ</label>
            <textarea id="f-memo" rows="3" placeholder="交流会での会話内容、相手の課題感など"></textarea>
          </div>
          <div class="field full"><label>次回アクション</label>
            <input type="text" id="f-action" placeholder="例：来週中にメール、○日に商談">
          </div>
        </div>
        <div class="btn-row">
          <button class="btn" onclick="resetForm()">キャンセル</button>
          <button class="btn primary" id="save-btn" onclick="saveContact()">保存してスプレッドシートに同期 →</button>
        </div>
      </div>
    </div>
  </div>

  <div id="panel-list" class="panel">
    <div class="stats-grid">
      <div class="stat"><div class="stat-num" id="s-total">0</div><div class="stat-label">総顧客数</div></div>
      <div class="stat"><div class="stat-num" id="s-hot">0</div><div class="stat-label">Hot</div></div>
      <div class="stat"><div class="stat-num" id="s-deal">0</div><div class="stat-label">成約</div></div>
      <div class="stat"><div class="stat-num" id="s-action">0</div><div class="stat-label">アクション待ち</div></div>
    </div>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="名前・会社名で検索..." oninput="renderList()">
      <select id="filter-status" onchange="renderList()">
        <option value="">すべて</option>
        <option value="hot">Hot</option>
        <option value="warm">Warm</option>
        <option value="cold">Cold</option>
        <option value="deal">成約</option>
        <option value="ng">NG</option>
      </select>
    </div>
    <div id="contact-list"></div>
  </div>
</div>

<div class="overlay" id="detail-overlay">
  <div class="overlay-backdrop" onclick="closeDetail()"></div>
  <div class="modal">
    <div class="modal-header">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="avatar" id="d-avatar">-</div>
        <div>
          <div class="modal-title" id="d-name">-</div>
          <div style="font-size:12px;color:#888" id="d-company">-</div>
        </div>
      </div>
      <button class="btn" onclick="closeDetail()" style="padding:4px 10px;font-size:12px">閉じる</button>
    </div>
    <div class="field-grid" id="d-fields" style="margin-bottom:1rem"></div>
    <div class="divider">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <span style="font-size:13px;font-weight:500">ステータス更新</span>
        <select id="d-status" onchange="updateStatus()" style="font-size:12px;padding:4px 8px;border:1px solid #e0e0e0;border-radius:6px;background:#f5f5f3;font-family:inherit">
          <option value="warm">Warm</option>
          <option value="hot">Hot</option>
          <option value="cold">Cold</option>
          <option value="deal">成約</option>
          <option value="ng">NG</option>
        </select>
      </div>
      <div style="font-size:13px;font-weight:500;margin-bottom:8px">商談メモを追加</div>
      <div class="note-input-row">
        <input type="text" id="d-new-note" placeholder="商談内容・ヒアリング・次のアクション...">
        <button class="btn primary" onclick="addNote()">追加</button>
      </div>
      <div class="notes-list" id="d-notes"></div>
    </div>
    <div class="btn-row" style="border-top:1px solid #e8e8e5;padding-top:1rem;margin-top:1rem">
      <button class="btn danger" onclick="deleteContact()">削除</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbx39r7EtWTgIPFOP-X-HKk1SEZHW-uW6Ddz1ATN6r_jxJFsMP7Q_yMnAb8viMLSPgE/exec';
const MAX_SIZE = 4 * 1024 * 1024; // 4MB上限
const MAX_WIDTH = 1600;

let contacts = JSON.parse(localStorage.getItem('meishi_crm_v5') || '[]');
let currentId = null;
let queue = [];

function saveLocal(){localStorage.setItem('meishi_crm_v5',JSON.stringify(contacts))}

function toast(msg,d=2500){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),d);
}

async function syncGas(payload){
  try{
    await fetch(GAS_URL,{method:'POST',body:JSON.stringify(payload),mode:'no-cors'});
    return true;
  }catch(e){return false}
}

// 画像を自動圧縮してbase64を返す
function compressImage(file){
  return new Promise((resolve)=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let w=img.width, h=img.height;
      if(w>MAX_WIDTH){h=Math.round(h*MAX_WIDTH/w);w=MAX_WIDTH;}
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      // 品質を下げながら4MB以内に収める
      let quality=0.85;
      let dataUrl=canvas.toDataURL('image/jpeg',quality);
      while(dataUrl.length*0.75>MAX_SIZE && quality>0.3){
        quality-=0.1;
        dataUrl=canvas.toDataURL('image/jpeg',quality);
      }
      resolve(dataUrl);
    };
    img.src=url;
  });
}

function showTab(t,el){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-'+t).classList.add('active');
  if(t==='list'){renderList();updateStats()}
}

function onDrag(e,on){e.preventDefault();document.getElementById('dropzone').classList.toggle('drag',on)}
function onDrop(e){
  e.preventDefault();onDrag(e,false);
  const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'));
  if(files.length)addToQueue(files);
}
function handleFiles(e){
  const files=Array.from(e.target.files);
  if(files.length)addToQueue(files);
}

function addToQueue(files){
  files.forEach(file=>{
    const id=Date.now()+Math.random();
    queue.push({id,file,status:'waiting',data:null,thumb:null});
  });
  renderQueue();
  processQueue();
}

function renderQueue(){
  const el=document.getElementById('queue-list');
  if(!queue.length){el.style.display='none';return}
  el.style.display='flex';
  el.innerHTML=queue.map(item=>`
    <div class="queue-item" id="qi-${item.id}">
      ${item.thumb?`<img class="queue-thumb" src="${item.thumb}" alt="">`:'<div class="queue-thumb" style="background:#e0e0e0;border-radius:4px"></div>'}
      <div class="queue-info">
        <div class="queue-name">${item.file.name}</div>
        <div class="queue-status ${item.status==='reading'?'reading':item.status==='done'?'done':item.status==='error'?'error':''}">
          ${item.status==='waiting'?'待機中':item.status==='reading'?'読み取り中...':item.status==='done'?'✓ 読み取り完了':'✗ 読み取り失敗'}
        </div>
      </div>
      ${item.status==='done'?`<button class="btn primary" style="font-size:12px;padding:5px 10px;white-space:nowrap" onclick="editQueueItem('${item.id}')">編集・保存</button>`:''}
      <button class="queue-remove" onclick="removeFromQueue('${item.id}')">×</button>
    </div>
  `).join('');
}

async function processQueue(){
  for(const item of queue){
    if(item.status!=='waiting')continue;
    item.status='reading';
    renderQueue();
    try{
      // 自動圧縮
      const dataUrl=await compressImage(item.file);
      item.thumb=dataUrl;
      const base64=dataUrl.split(',')[1];
      const res=await fetch('/.netlify/functions/ocr',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({imageData:base64,mimeType:'image/jpeg'})
      });
      const result=await res.json();
      if(result.ok){
        const text=result.data.replace(/```json|```/g,'').trim();
        item.data=JSON.parse(text);
        item.status='done';
      }else{
        item.status='error';
      }
    }catch(e){
      item.status='error';
    }
    renderQueue();
  }
}

function removeFromQueue(id){
  queue=queue.filter(x=>String(x.id)!==String(id));
  renderQueue();
  if(!queue.length)document.getElementById('form-area').style.display='none';
}

function editQueueItem(id){
  const item=queue.find(x=>String(x.id)===String(id));
  if(!item||!item.data)return;
  fillForm(item.data);
  document.getElementById('form-area').style.display='block';
  document.getElementById('form-area').scrollIntoView({behavior:'smooth'});
  document.getElementById('form-area').dataset.queueId=id;
}

function fillForm(info){
  document.getElementById('f-company').value=info.company||'';
  document.getElementById('f-name').value=info.name||'';
  document.getElementById('f-title').value=info.title||'';
  document.getElementById('f-email').value=info.email||'';
  document.getElementById('f-phone').value=info.phone||'';
  document.getElementById('f-web').value=info.website||'';
  document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('f-status').value='warm';
  document.getElementById('f-memo').value='';
  document.getElementById('f-action').value='';
  updateAvatar();
}

function getInitials(name,company){
  if(name){const p=name.replace(/\s+/g,'');return p.slice(-2)||p[0]||'?'}
  return company?company[0]:'?';
}
function updateAvatar(){
  document.getElementById('form-avatar').textContent=getInitials(
    document.getElementById('f-name').value,
    document.getElementById('f-company').value
  );
}

async function saveContact(){
  const btn=document.getElementById('save-btn');
  const contact={
    id:Date.now(),
    company:document.getElementById('f-company').value,
    name:document.getElementById('f-name').value,
    title:document.getElementById('f-title').value,
    email:document.getElementById('f-email').value,
    phone:document.getElementById('f-phone').value,
    website:document.getElementById('f-web').value,
    date:document.getElementById('f-date').value,
    event:document.getElementById('f-event').value,
    status:document.getElementById('f-status').value,
    memo:document.getElementById('f-memo').value,
    action_next:document.getElementById('f-action').value,
    notes:[],
    synced:false,
    createdAt:new Date().toLocaleString('ja-JP')
  };
  if(!contact.name&&!contact.company){toast('名前または会社名を入力してください');return}
  btn.textContent='同期中...';btn.disabled=true;
  contacts.unshift(contact);
  saveLocal();
  const ok=await syncGas({action:'add',...contact,notes:''});
  contact.synced=ok;
  saveLocal();
  btn.textContent='保存してスプレッドシートに同期 →';btn.disabled=false;
  toast(ok?`✓ 「${contact.name||contact.company}」を登録・同期しました`:'✓ 登録しました（同期エラー）');
  const qid=document.getElementById('form-area').dataset.queueId;
  if(qid)removeFromQueue(qid);
  resetForm();
}

function resetForm(){
  document.getElementById('form-area').style.display='none';
  document.getElementById('file-input').value='';
  ['f-company','f-name','f-title','f-email','f-phone','f-web','f-date','f-event','f-memo','f-action'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-status').value='warm';
  document.getElementById('form-avatar').textContent='-';
}

const statusLabel={hot:'Hot',warm:'Warm',cold:'Cold',deal:'成約',ng:'NG'};

function renderList(){
  updateStats();
  const q=document.getElementById('search-input').value.toLowerCase();
  const fs=document.getElementById('filter-status').value;
  const filtered=contacts.filter(c=>(!q||(c.name+c.company).toLowerCase().includes(q))&&(!fs||c.status===fs));
  const el=document.getElementById('contact-list');
  if(!filtered.length){el.innerHTML='<div class="empty">該当する顧客が見つかりません</div>';return}
  el.innerHTML=filtered.map(c=>`
    <div class="list-item" onclick="openDetail(${c.id})">
      <div class="avatar">${getInitials(c.name,c.company)}</div>
      <div class="info">
        <div class="name">${c.name||'(名前なし)'}</div>
        <div class="meta">${[c.company,c.title].filter(Boolean).join(' / ')}</div>
        <div class="meta">${[c.email,c.phone].filter(Boolean).join(' · ')}</div>
      </div>
      <div class="right">
        <span class="badge ${c.status}">${statusLabel[c.status]}</span>
        <span style="font-size:11px;color:#aaa">${c.date||''}</span>
        <span class="sync-badge ${c.synced?'ok':'pending'}">${c.synced?'✓ 同期済':'未同期'}</span>
      </div>
    </div>
  `).join('');
}

function updateStats(){
  document.getElementById('s-total').textContent=contacts.length;
  document.getElementById('s-hot').textContent=contacts.filter(c=>c.status==='hot').length;
  document.getElementById('s-deal').textContent=contacts.filter(c=>c.status==='deal').length;
  document.getElementById('s-action').textContent=contacts.filter(c=>c.action_next&&!['deal','ng'].includes(c.status)).length;
}

function openDetail(id){
  const c=contacts.find(x=>x.id===id);if(!c)return;
  currentId=id;
  document.getElementById('d-avatar').textContent=getInitials(c.name,c.company);
  document.getElementById('d-name').textContent=c.name||'(名前なし)';
  document.getElementById('d-company').textContent=c.company||'';
  document.getElementById('d-status').value=c.status;
  const fields=[['役職',c.title],['メール',c.email],['電話',c.phone],['交流会',c.event],['名刺交換日',c.date],['次のアクション',c.action_next],['初回メモ',c.memo]].filter(([,v])=>v);
  document.getElementById('d-fields').innerHTML=fields.map(([k,v])=>`
    <div class="field"><label>${k}</label><div style="font-size:13px;padding:4px 0">${v}</div></div>
  `).join('');
  renderNotes(c);
  document.getElementById('detail-overlay').classList.add('open');
}

function renderNotes(c){
  const el=document.getElementById('d-notes');
  if(!c.notes.length){el.innerHTML='<div style="font-size:12px;color:#bbb;padding:8px 0">まだ商談メモはありません</div>';return}
  el.innerHTML=c.notes.map(n=>`<div class="note-item">${n.text}<div class="note-meta">${n.date}</div></div>`).join('');
}

async function addNote(){
  const text=document.getElementById('d-new-note').value.trim();
  if(!text)return;
  const c=contacts.find(x=>x.id===currentId);if(!c)return;
  c.notes.push({text,date:new Date().toLocaleString('ja-JP')});
  saveLocal();
  const ok=await syncGas({action:'update',id:c.id,status:c.status,notes:c.notes.map(n=>n.text).join(' / ')});
  c.synced=ok;saveLocal();
  document.getElementById('d-new-note').value='';
  renderNotes(c);renderList();
  toast(ok?'✓ 商談メモを同期しました':'メモを追加しました（同期エラー）');
}

async function updateStatus(){
  const c=contacts.find(x=>x.id===currentId);if(!c)return;
  c.status=document.getElementById('d-status').value;
  saveLocal();
  const ok=await syncGas({action:'update',id:c.id,status:c.status,notes:c.notes.map(n=>n.text).join(' / ')});
  c.synced=ok;saveLocal();
  renderList();
  toast(ok?`✓ ステータスを「${statusLabel[c.status]}」に更新・同期しました`:'ステータスを更新しました（同期エラー）');
}

async function deleteContact(){
  if(!confirm('この顧客データを削除しますか？\nスプレッドシートの対応行も削除されます。'))return;
  await syncGas({action:'delete',id:currentId});
  contacts=contacts.filter(x=>x.id!==currentId);
  saveLocal();closeDetail();renderList();
  toast('✓ 削除しました');
}

function closeDetail(){document.getElementById('detail-overlay').classList.remove('open')}

renderList();updateStats();
</script>
</body>
</html>
